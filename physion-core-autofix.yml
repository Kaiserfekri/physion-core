name: Physion-core Auto-Fix & CI
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  auto-fix:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install black flake8 pylint isort autoflake pytest autopep8
    - name: Clean & organize code
      run: python tools/auto_refactor_physion_core.py
    - name: Run tests
      run: pytest -q
    - name: Auto-fix formulas via FormulaEngine
      if: failure()
      run: python tools/auto_fix_formulas.py
    - name: Re-run tests after auto-fix
      run: pytest -q
    - name: Commit auto-fixes
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "Physion-core Auto-Fix: architecture, code, formulas"
        branch: main
