version: "3"

services:
  api:
    build: .
    command: uvicorn api_main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: .
    command: python worker.py
    depends_on:
      - redis

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
